name: CI/CD Pipeline

on:
  push:
    branches: [ "main", "duck_fix" ] # Chạy khi bạn push lên 2 nhánh này

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./Backend/UrlShortener.Api
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/url-backend:latest

      - name: Build and push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./Frontend
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/url-frontend:latest
