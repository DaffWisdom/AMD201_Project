name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ] # Hoặc tên nhánh chính của bạn

jobs:
  # --- GIAI ĐOẠN 1: KIỂM TRA BACKEND ---
  backend-ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore dependencies
        run: dotnet restore "Backend/UrlShortener.Api/UrlShortener.Api.csproj"

      - name: Build
        run: dotnet build "Backend/UrlShortener.Api/UrlShortener.Api.csproj" --no-restore

      # Quan trọng: Chạy Unit Test để đạt điểm Pass
      - name: Run Tests
        run: dotnet test "Backend/UrlShortener.Tests/UrlShortener.Tests.csproj" --verbosity normal

  # --- GIAI ĐOẠN 2: KIỂM TRA FRONTEND ---
  frontend-ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          cd Frontend
          npm install

      # Quan trọng: Chạy Linting để đạt điểm Merit
      - name: Linting
        run: |
          cd Frontend
          npm run lint

  # --- GIAI ĐOẠN 3: BUILD & PUSH DOCKER IMAGES ---
  docker-build:
    needs: [backend-ci, frontend-ci]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      # Giả sử bạn đẩy lên Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./Backend/UrlShortener.Api
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/url-shortener-api:latest

      - name: Build and Push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./Frontend
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/url-shortener-web:latest