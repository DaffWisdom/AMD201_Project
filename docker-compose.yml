services:
  backend-api:
    build:
      context: ./Backend/UrlShortener.Api
    ports:
      - "8080:8080"
    volumes:
      - ./Backend/UrlShortener.Api/urlshortener.db:/app/urlshortener.db

  frontend-ui:
    build:
      context: ./Frontend
    ports:
      - "5173:80"
    depends_on:
      - backend-api