version: '3.8'

services:
  backend:
    build:
      context: ./Backend/UrlShortener.Api
      dockerfile: Dockerfile
    ports:
      - "5000:8080" # Map cổng 5000 ở máy bạn vào cổng 8080 của container
    environment:
      - ASPNETCORE_ENVIRONMENT=Development

  frontend:
    build:
      context: ./Frontend
      dockerfile: Dockerfile
    ports:
      - "5173:80" # Map cổng 5173 ở máy bạn vào cổng 80 của Nginx
    depends_on:
      - backend